<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1050 560" role="img"><rect width="1050" height="560" fill="#fff"/><text x="525" y="50" text-anchor="middle" font-family="Arial" font-size="34">Surface habitability is a coupled planetary system</text><rect x="360" y="225" width="330" height="105" rx="20" fill="#dff2ff" stroke="#2876a5" stroke-width="4"/><text x="525" y="265" text-anchor="middle" font-family="Arial" font-size="24">surface liquid water</text><text x="525" y="297" text-anchor="middle" font-family="Arial" font-size="21">possible habitat, not proof of life</text><g font-family="Arial" font-size="21" fill="#111" stroke="#333" stroke-width="3"><rect x="65" y="115" width="260" height="70" rx="15" fill="#fff2cc"/><text x="195" y="158" text-anchor="middle" stroke="none">stellar flux</text><rect x="725" y="115" width="260" height="70" rx="15" fill="#fff2cc"/><text x="855" y="158" text-anchor="middle" stroke="none">planet size</text><rect x="65" y="245" width="260" height="70" rx="15" fill="#e4f3d7"/><text x="195" y="288" text-anchor="middle" stroke="none">atmosphere</text><rect x="725" y="245" width="260" height="70" rx="15" fill="#e4f3d7"/><text x="855" y="288" text-anchor="middle" stroke="none">geology / carbon cycle</text><rect x="65" y="375" width="260" height="70" rx="15" fill="#f4e2d4"/><text x="195" y="418" text-anchor="middle" stroke="none">formation history</text><rect x="725" y="375" width="260" height="70" rx="15" fill="#f4e2d4"/><text x="855" y="418" text-anchor="middle" stroke="none">magnetic protection</text></g><text x="525" y="505" text-anchor="middle" font-family="Arial" font-size="24" fill="#222">No single factor is enough; Venus, Earth, and Mars diverged because the factors evolved together.</text></svg>