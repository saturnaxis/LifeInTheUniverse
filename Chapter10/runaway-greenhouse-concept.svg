<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1050 620" role="img"><rect width="1050" height="620" fill="#fff"/><text x="525" y="50" text-anchor="middle" font-family="Arial" font-size="34">Runaway greenhouse: when cooling stops keeping up</text><line x1="125" y1="500" x2="900" y2="500" stroke="#111" stroke-width="3"/><line x1="125" y1="500" x2="125" y2="105" stroke="#111" stroke-width="3"/><text x="525" y="555" text-anchor="middle" font-family="Arial" font-size="24">surface temperature</text><text x="45" y="305" text-anchor="middle" font-family="Arial" font-size="24" transform="rotate(-90 45 305)">outgoing thermal radiation</text><path d="M145 470 C250 390 345 315 460 245 C560 185 650 175 760 175 C825 175 865 175 900 175" fill="none" stroke="#d1462f" stroke-width="6"/><line x1="130" y1="175" x2="920" y2="175" stroke="#d1462f" stroke-width="3" stroke-dasharray="10 10" opacity="0.7"/><text x="700" y="155" font-family="Arial" font-size="23" fill="#9b2d20">radiation limit</text><rect x="620" y="360" width="330" height="95" rx="16" fill="#fff1d7" stroke="#9b6a00" stroke-width="3"/><text x="785" y="393" text-anchor="middle" font-family="Arial" font-size="21">If absorbed sunlight exceeds</text><text x="785" y="422" text-anchor="middle" font-family="Arial" font-size="21">the radiation limit, the ocean</text><text x="785" y="451" text-anchor="middle" font-family="Arial" font-size="21">cannot remain stable.</text></svg>