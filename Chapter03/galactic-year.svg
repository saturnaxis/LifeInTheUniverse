<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="620" viewBox="0 0 1100 620" role="img" aria-labelledby="title desc">
  <title id="title">Schematic visualization of one Galactic year</title>
  <desc id="desc">A top-down schematic of the Sun orbiting the center of the Milky Way. One complete orbit is labeled as approximately 230 million Earth years.</desc>
  <defs>
    <marker id="arrowGold" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#F2A900"/>
    </marker>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.22"/>
    </filter>
    <radialGradient id="bulge" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#F2A900" stop-opacity="0.95"/>
      <stop offset="65%" stop-color="#F2A900" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#F2A900" stop-opacity="0.03"/>
    </radialGradient>
  </defs>

  <rect x="0" y="0" width="1100" height="620" fill="none"/>

  <text x="550" y="55" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="700" fill="#0033A0">
    One Galactic Year
  </text>
  <text x="550" y="88" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="20" fill="#444">
    The Sun takes about 230 million Earth years to orbit the center of the Milky Way once.
  </text>

  <!-- Galaxy panel -->
  <g transform="translate(70,125)">
    <rect x="0" y="0" width="570" height="420" rx="24" fill="#ffffff" opacity="0.92" filter="url(#softShadow)"/>
    <text x="285" y="38" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700" fill="#0033A0">
      Sun's orbit around the Galaxy
    </text>

    <!-- stylized galaxy disk -->
    <g transform="translate(285,225)">
      <ellipse cx="0" cy="0" rx="215" ry="110" fill="#0033A0" opacity="0.07"/>
      <ellipse cx="0" cy="0" rx="180" ry="86" fill="none" stroke="#0033A0" stroke-width="3" opacity="0.23"/>
      <ellipse cx="0" cy="0" rx="130" ry="62" fill="none" stroke="#0033A0" stroke-width="3" opacity="0.18"/>
      <ellipse cx="0" cy="0" rx="75" ry="36" fill="none" stroke="#0033A0" stroke-width="3" opacity="0.16"/>
      <circle cx="0" cy="0" r="55" fill="url(#bulge)"/>
      <text x="0" y="7" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="700" fill="#603900">Galactic center</text>

      <!-- orbit -->
      <ellipse cx="0" cy="0" rx="205" ry="98" fill="none" stroke="#F2A900" stroke-width="6" stroke-dasharray="12 10"/>
      <path d="M -10,-98 C 65,-98 130,-73 180,-35" fill="none" stroke="#F2A900" stroke-width="7" marker-end="url(#arrowGold)"/>
      <circle cx="205" cy="0" r="10" fill="#F2A900" stroke="#0033A0" stroke-width="3"/>
      <text x="228" y="5" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700" fill="#0033A0">Sun now</text>

      <line x1="0" y1="0" x2="205" y2="0" stroke="#555" stroke-width="2" stroke-dasharray="5 6"/>
      <text x="103" y="-12" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#555">~27,000 ly</text>
    </g>

    <text x="285" y="390" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#555">
      Schematic only: the orbit and galaxy features are not drawn to scale.
    </text>
  </g>

  <!-- Time panel -->
  <g transform="translate(690,125)">
    <rect x="0" y="0" width="340" height="420" rx="24" fill="#ffffff" opacity="0.92" filter="url(#softShadow)"/>
    <text x="170" y="38" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700" fill="#0033A0">
      One lap in time
    </text>

    <line x1="65" y1="96" x2="65" y2="335" stroke="#0033A0" stroke-width="6" stroke-linecap="round"/>
    <circle cx="65" cy="96" r="12" fill="#F2A900" stroke="#0033A0" stroke-width="3"/>
    <circle cx="65" cy="156" r="9" fill="#ffffff" stroke="#0033A0" stroke-width="3"/>
    <circle cx="65" cy="216" r="9" fill="#ffffff" stroke="#0033A0" stroke-width="3"/>
    <circle cx="65" cy="276" r="9" fill="#ffffff" stroke="#0033A0" stroke-width="3"/>
    <circle cx="65" cy="335" r="12" fill="#F2A900" stroke="#0033A0" stroke-width="3"/>

    <text x="95" y="101" font-family="Arial, Helvetica, sans-serif" font-size="17" fill="#333">0 Myr</text>
    <text x="95" y="161" font-family="Arial, Helvetica, sans-serif" font-size="17" fill="#333">~58 Myr</text>
    <text x="95" y="221" font-family="Arial, Helvetica, sans-serif" font-size="17" fill="#333">~115 Myr</text>
    <text x="95" y="281" font-family="Arial, Helvetica, sans-serif" font-size="17" fill="#333">~173 Myr</text>
    <text x="95" y="340" font-family="Arial, Helvetica, sans-serif" font-size="17" fill="#333">~230 Myr</text>

    <text x="190" y="101" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#555">start</text>
    <text x="190" y="161" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#555">quarter orbit</text>
    <text x="190" y="221" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#555">half orbit</text>
    <text x="190" y="281" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#555">three-quarter orbit</text>
    <text x="190" y="340" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#555">one full orbit</text>

    <text x="170" y="386" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#555">
      A human lifetime is far too short
    </text>
    <text x="170" y="409" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#555">
      to notice this motion directly.
    </text>
  </g>
</svg>
