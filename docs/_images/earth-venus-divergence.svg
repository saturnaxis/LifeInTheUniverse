<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 620" role="img"><rect width="1100" height="620" fill="#ffffff"/><text x="275" y="60" text-anchor="middle" font-family="Arial" font-size="36" fill="#1b5e93">Earth pathway</text><text x="825" y="60" text-anchor="middle" font-family="Arial" font-size="36" fill="#9b4b14">Venus pathway</text><line x1="550" y1="85" x2="550" y2="570" stroke="#999" stroke-width="3" stroke-dasharray="12 10"/><rect x="70" y="115" width="410" height="85" rx="16" fill="#d8eefc" stroke="#1b5e93" stroke-width="3"/><text x="275" y="150" text-anchor="middle" font-family="Arial" font-size="22">cool enough for rain</text><text x="275" y="178" text-anchor="middle" font-family="Arial" font-size="20">water condenses into oceans</text><rect x="70" y="245" width="410" height="85" rx="16" fill="#dff4d7" stroke="#4b8a2f" stroke-width="3"/><text x="275" y="280" text-anchor="middle" font-family="Arial" font-size="22">CO₂ dissolves in water</text><text x="275" y="308" text-anchor="middle" font-family="Arial" font-size="20">carbonates store carbon in rocks</text><rect x="70" y="375" width="410" height="105" rx="16" fill="#eee2d6" stroke="#6b4d36" stroke-width="3"/><text x="275" y="412" text-anchor="middle" font-family="Arial" font-size="22">geology regulates climate</text><text x="275" y="442" text-anchor="middle" font-family="Arial" font-size="20">weathering and plate tectonics recycle carbon</text><rect x="620" y="115" width="410" height="85" rx="16" fill="#fff0cc" stroke="#b36b00" stroke-width="3"/><text x="825" y="150" text-anchor="middle" font-family="Arial" font-size="22">too warm for stable rain</text><text x="825" y="178" text-anchor="middle" font-family="Arial" font-size="20">water vapor strengthens greenhouse warming</text><rect x="620" y="245" width="410" height="85" rx="16" fill="#fde0d3" stroke="#b54020" stroke-width="3"/><text x="825" y="280" text-anchor="middle" font-family="Arial" font-size="22">UV breaks H₂O apart</text><text x="825" y="308" text-anchor="middle" font-family="Arial" font-size="20">hydrogen escapes; oxygen reacts with rock</text><rect x="620" y="375" width="410" height="105" rx="16" fill="#f6d0a8" stroke="#9b4b14" stroke-width="3"/><text x="825" y="412" text-anchor="middle" font-family="Arial" font-size="22">carbon remains in atmosphere</text><text x="825" y="442" text-anchor="middle" font-family="Arial" font-size="20">no ocean carbon cycle; resurfacing/outgassing</text><text x="550" y="555" text-anchor="middle" font-family="Arial" font-size="26" fill="#222">Venus and Earth diverged because atmosphere, geology, and water evolved together.</text></svg>