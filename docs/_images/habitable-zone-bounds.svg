<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 420" role="img"><rect width="1100" height="420" fill="#fff"/><text x="550" y="50" text-anchor="middle" font-family="Arial" font-size="32">Approximate habitable-zone estimates around the Sun today</text><line x1="120" y1="225" x2="980" y2="225" stroke="#111" stroke-width="4"/><rect x="232" y="105" width="748" height="34" rx="10" fill="#9bd389" opacity="0.6"/><text x="600" y="96" text-anchor="middle" font-family="Arial" font-size="20" fill="#2e6b2c">optimistic: about 0.84–1.7 AU</text><rect x="320" y="155" width="360" height="34" rx="10" fill="#5aa9e6" opacity="0.75"/><text x="500" y="148" text-anchor="middle" font-family="Arial" font-size="20" fill="#205078">conservative: about 0.95–1.4 AU</text><circle cx="136" cy="225" r="12" fill="#d98b4e"/><text x="136" y="200" text-anchor="middle" font-family="Arial" font-size="20" fill="#8a4200">Venus</text><circle cx="360" cy="225" r="14" fill="#3f8ed8"/><text x="360" y="200" text-anchor="middle" font-family="Arial" font-size="20" fill="#125184">Earth</text><circle cx="790" cy="225" r="11" fill="#c45d3b"/><text x="790" y="200" text-anchor="middle" font-family="Arial" font-size="20" fill="#8a2d1b">Mars</text><text x="550" y="400" text-anchor="middle" font-family="Arial" font-size="21">Model boundaries are search tools, not guarantees that a planet is inhabited.</text></svg>