<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="360" viewBox="0 0 1200 360">
  <rect width="1200" height="360" fill="#ffffff"/>
  <style>
    .card { fill:#fafafa; stroke:#b9b9b9; stroke-width:2; rx:22; }
    .title { font: 700 34px Arial, sans-serif; fill:#111; }
    .body { font: 24px Arial, sans-serif; fill:#222; }
    .caption { font: 700 28px Arial, sans-serif; fill:#0033A0; }
  </style>
  <text x="600" y="52" text-anchor="middle" class="caption">One trait is not enough to define life</text>
  <rect x="50" y="90" width="330" height="220" class="card" rx="22"/>
  <text x="215" y="145" text-anchor="middle" class="title">Movement</text>
  <text x="80" y="200" class="body">Animals move, but so do</text>
  <text x="80" y="235" class="body">clouds, rivers, and fire.</text>
  <rect x="435" y="90" width="330" height="220" class="card" rx="22"/>
  <text x="600" y="145" text-anchor="middle" class="title">Growth</text>
  <text x="465" y="200" class="body">Living things grow, but</text>
  <text x="465" y="235" class="body">crystals and mountains</text>
  <text x="465" y="270" class="body">can also grow.</text>
  <rect x="820" y="90" width="330" height="220" class="card" rx="22"/>
  <text x="985" y="145" text-anchor="middle" class="title">Reproduction-like spread</text>
  <text x="850" y="200" class="body">Life reproduces, but fire</text>
  <text x="850" y="235" class="body">and computer viruses can</text>
  <text x="850" y="270" class="body">spread or copy too.</text>
</svg>