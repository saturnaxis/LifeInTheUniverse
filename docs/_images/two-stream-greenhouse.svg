<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 620" role="img"><rect width="1000" height="620" fill="#f8fbff"/><rect x="120" y="110" width="760" height="240" rx="22" fill="#c8dcf4" opacity="0.65" stroke="#446" stroke-width="3"/><rect x="120" y="350" width="760" height="95" fill="#9b6b43"/><text x="500" y="145" text-anchor="middle" font-family="Arial" font-size="28" fill="#203040">atmosphere: mostly transparent to sunlight</text><text x="500" y="330" text-anchor="middle" font-family="Arial" font-size="28" fill="#203040">more opaque to infrared radiation</text><text x="500" y="410" text-anchor="middle" font-family="Arial" font-size="26" fill="#fff">warm surface</text><circle cx="85" cy="75" r="42" fill="#ffd24d" stroke="#d6a000" stroke-width="3"/><defs><marker id="a" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="context-stroke"/></marker></defs><path d="M140 110 L310 250" stroke="#f2c94c" stroke-width="7" marker-end="url(#a)"/><path d="M350 360 C350 280 350 210 350 125" stroke="#d64a3a" stroke-width="7" marker-end="url(#a)" fill="none"/><path d="M520 360 C520 285 520 250 520 205" stroke="#d64a3a" stroke-width="7" marker-end="url(#a)" fill="none"/><path d="M650 210 C650 270 650 315 650 360" stroke="#d64a3a" stroke-width="7" marker-end="url(#a)" fill="none"/><path d="M760 250 C760 310 760 350 760 385" stroke="#d64a3a" stroke-width="7" marker-end="url(#a)" fill="none"/><text x="275" y="205" font-family="Arial" font-size="23" fill="#574100">visible sunlight enters</text><text x="600" y="180" font-family="Arial" font-size="22" fill="#9c2e23">IR re-emitted downward</text><text x="500" y="535" text-anchor="middle" font-family="Arial" font-size="27" fill="#111">Greater infrared optical depth raises the surface temperature needed to balance energy.</text></svg>