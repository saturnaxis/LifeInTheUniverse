<svg role="img" aria-labelledby="bias-title bias-desc" viewBox="0 0 900 500" style="max-width:100%; height:auto; display:block; margin-left:auto; margin-right:auto;" xmlns="http://www.w3.org/2000/svg">
  <title id="bias-title">Confirmation bias as a filter</title>
  <desc id="bias-desc">A diagram showing mixed evidence entering a bias filter, with supporting evidence remembered and conflicting evidence ignored.</desc>

  <rect x="20" y="20" width="860" height="460" rx="24" fill="#f8f9fb" stroke="#d0d7de" stroke-width="2"/>

  <text x="450" y="65" text-anchor="middle" font-size="30" font-weight="700" fill="#111827">Confirmation bias</text>
  <text x="450" y="98" text-anchor="middle" font-size="18" fill="#374151">We tend to notice evidence that supports what we already believe.</text>

  <rect x="70" y="155" width="220" height="210" rx="18" fill="#ffffff" stroke="#9ca3af" stroke-width="2"/>
  <text x="180" y="190" text-anchor="middle" font-size="21" font-weight="700" fill="#111827">Mixed evidence</text>
  <text x="105" y="235" font-size="17" fill="#064e3b">✓ Supporting example</text>
  <text x="105" y="270" font-size="17" fill="#991b1b">✕ Failed prediction</text>
  <text x="105" y="305" font-size="17" fill="#1e3a8a">? Missing data</text>
  <text x="105" y="340" font-size="17" fill="#92400e">↔ Alternative explanation</text>

  <line x1="290" y1="260" x2="365" y2="260" stroke="#6b7280" stroke-width="4"/>
  <polygon points="365,260 350,250 350,270" fill="#6b7280"/>

  <rect x="370" y="155" width="160" height="210" rx="18" fill="#fef3c7" stroke="#f59e0b" stroke-width="3"/>
  <text x="450" y="235" text-anchor="middle" font-size="20" font-weight="700" fill="#78350f">Belief</text>
  <text x="450" y="265" text-anchor="middle" font-size="20" font-weight="700" fill="#78350f">filter</text>
  <text x="450" y="305" text-anchor="middle" font-size="15" fill="#111827">What fits feels</text>
  <text x="450" y="327" text-anchor="middle" font-size="15" fill="#111827">more important.</text>

  <line x1="530" y1="260" x2="605" y2="215" stroke="#6b7280" stroke-width="4"/>
  <polygon points="605,215 587,216 597,231" fill="#6b7280"/>
  <line x1="530" y1="260" x2="605" y2="320" stroke="#6b7280" stroke-width="4" stroke-dasharray="8 8"/>
  <polygon points="605,320 588,314 598,300" fill="#6b7280"/>

  <rect x="610" y="155" width="220" height="95" rx="16" fill="#ecfdf5" stroke="#10b981" stroke-width="3"/>
  <text x="720" y="192" text-anchor="middle" font-size="20" font-weight="700" fill="#064e3b">Remembered</text>
  <text x="720" y="222" text-anchor="middle" font-size="17" fill="#111827">Evidence that agrees</text>

  <rect x="610" y="290" width="220" height="95" rx="16" fill="#fee2e2" stroke="#ef4444" stroke-width="3"/>
  <text x="720" y="327" text-anchor="middle" font-size="20" font-weight="700" fill="#7f1d1d">Discounted</text>
  <text x="720" y="357" text-anchor="middle" font-size="17" fill="#111827">Evidence that disagrees</text>
</svg>