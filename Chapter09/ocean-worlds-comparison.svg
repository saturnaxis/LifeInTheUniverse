<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
<rect width="1600" height="900" fill="#0b1020"/>
<text x="800" y="70" text-anchor="middle" fill="#ffffff" font-size="42" font-family="DejaVu Sans">Astrobiology comparison of selected outer Solar System moons</text>
<g font-family="DejaVu Sans" font-size="26">
<rect x="120" y="135" width="1360" height="105" rx="18" fill="#0f766e"/><text x="160" y="195" fill="#ffffff">Europa</text><text x="420" y="195" fill="#ffffff">strong ocean evidence</text><text x="790" y="195" fill="#ffffff">tidal heating</text><text x="1080" y="195" fill="#ffffff">best Jupiter target</text>
<rect x="120" y="265" width="1360" height="105" rx="18" fill="#0f766e" opacity="0.88"/><text x="160" y="325" fill="#ffffff">Enceladus</text><text x="420" y="325" fill="#ffffff">plumes from ocean</text><text x="790" y="325" fill="#ffffff">sampleable material</text><text x="1080" y="325" fill="#ffffff">best Saturn target</text>
<rect x="120" y="395" width="1360" height="105" rx="18" fill="#1d4ed8" opacity="0.85"/><text x="160" y="455" fill="#ffffff">Ganymede</text><text x="420" y="455" fill="#ffffff">likely ocean</text><text x="790" y="455" fill="#ffffff">deep/thick ice</text><text x="1080" y="455" fill="#ffffff">less accessible</text>
<rect x="120" y="525" width="1360" height="105" rx="18" fill="#1d4ed8" opacity="0.72"/><text x="160" y="585" fill="#ffffff">Callisto</text><text x="420" y="585" fill="#ffffff">possible salty ocean</text><text x="790" y="585" fill="#ffffff">weak heating</text><text x="1080" y="585" fill="#ffffff">lower priority</text>
<rect x="120" y="655" width="1360" height="105" rx="18" fill="#92400e" opacity="0.92"/><text x="160" y="715" fill="#ffffff">Titan</text><text x="420" y="715" fill="#ffffff">thick atmosphere + organics</text><text x="790" y="715" fill="#ffffff">methane/ethane liquids</text><text x="1080" y="715" fill="#ffffff">new chemistry?</text>
<text x="800" y="835" text-anchor="middle" fill="#ffffff" font-size="30">Ranking habitability requires water, chemistry, energy, and access for testing—not just one exciting feature.</text>
</g>
</svg>